name: Java Compile and Test (Maven)

# Define what events trigger the pipeline
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    # Use the latest Ubuntu runner provided by GitHub
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository source code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up the Java Development Kit (JDK)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21' # Change to '17' or '11' if your project uses an older version
          distribution: 'temurin' # Eclipse Temurin is recommended and widely used
          cache: 'maven' # Automatically caches Maven dependencies to speed up future runs

      # Step 3: Compile the project and run tests
      - name: Compile and Test with Maven
        run: mvn clean install -DskipTests -X